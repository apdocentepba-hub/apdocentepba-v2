name: Report worker routes

on:
  workflow_dispatch:

jobs:
  report-worker-routes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Report routes from worker.js
        run: node scripts/report-worker-routes.mjs
