name: Build Android Wrapper Debug

on:
  workflow_dispatch:
  push:
    branches:
      - apk-safe
    paths:
      - 'android-wrapper/**'
      - '.github/workflows/android-wrapper-debug.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle -p android-wrapper :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APDocentePBA-debug-apk
          path: android-wrapper/app/build/outputs/apk/debug/*.apk
