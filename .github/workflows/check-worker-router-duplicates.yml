name: Check worker router duplicates

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  check-worker-router-duplicates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check duplicated provincia routes in worker.js
        run: node scripts/check-worker-router-duplicates.mjs
