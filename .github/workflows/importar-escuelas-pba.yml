name: Importar escuelas PBA

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/importar-escuelas-pba.yml'

permissions:
  contents: write

jobs:
  importar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar padron oficial
        run: |
          mkdir -p data
          python - <<'PY'
          import urllib.request, pathlib
          url = 'https://www.argentina.gob.ar/sites/default/files/mae_actualizado_2019-09-16_envios.zip'
          path = pathlib.Path('data/mae_actualizado_2019-09-16_envios.zip')
          urllib.request.urlretrieve(url, path)
          size = path.stat().st_size
          print(f'Descargado: {path} ({size} bytes)')
          if size < 1000:
              raise SystemExit('Archivo demasiado chico: posible descarga fallida')
          PY

      - name: Commit padron local
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/mae_actualizado_2019-09-16_envios.zip
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear"
          else
            git commit -m "Actualizar padron escuelas PBA"
            git push
          fi

