name: Deploy Mobile Worker Sandbox

on:
  workflow_dispatch:

jobs:
  deploy-mobile-worker-sandbox:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/mobile-worker-sandbox'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy isolated mobile worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler deploy --config mobile-worker-sandbox/wrangler.mobile.example.toml
