plugins {
    id 'com.android.application'
}

android {
    namespace 'ar.com.alertasapd.app'
    compileSdk 35

    defaultConfig {
        applicationId 'ar.com.alertasapd.app'
        minSdk 23
        targetSdk 35
        versionCode 5
        versionName '0.5.0'
    }
}

dependencies {
    implementation 'androidx.browser:browser:1.8.0'
    implementation 'androidx.work:work-runtime:2.9.1'
}
