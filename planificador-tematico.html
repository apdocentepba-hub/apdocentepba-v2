<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Planificador temático</title><style>body{font-family:Arial,sans-serif;background:#f5f9ff;color:#061a37;margin:0}.wrap{max-width:1000px;margin:auto;padding:18px}.box{background:#fff;border:1px solid #dbe7f5;border-radius:22px;padding:18px;margin:12px 0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}input,select,textarea{padding:10px;border:1px solid #cbd8ea;border-radius:12px;font:inherit;width:100%}label{font-weight:bold}.btn{border:1px solid #dbe7f5;border-radius:999px;padding:10px 14px;background:#fff;font-weight:bold;cursor:pointer}.primary{background:#2454f5;color:white;border-color:#2454f5}.out{white-space:pre-wrap;line-height:1.5}.tag{display:inline-block;background:#eef6ff;color:#0f4fb8;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:bold}@media(max-width:800px){.grid{grid-template-columns:1fr}.btn{width:100%;margin:4px 0}}</style></head><body><div class="wrap"><div class="box"><span class="tag">Planificador temático</span><h1>Planificador que habla del tema</h1><p>Gratis, sin IA paga. Usa el tema escrito para generar conceptos, ejemplos, preguntas, actividad y cierre.</p><p><a class="btn" href="./herramientas.html">Centro</a></p></div><div class="box"><div class="grid"><p><label>Materia</label><input id="mat" placeholder="Ej: Matemática"></p><p><label>Año</label><select id="anio"><option>1º año</option><option>2º año</option><option>3º año</option><option>4º año</option><option>5º año</option><option>6º año</option></select></p><p><label>Tema concreto</label><input id="tema" placeholder="Ej: números irracionales y recta real"></p><p><label>Duración</label><select id="dur"><option>40 minutos</option><option>80 minutos</option><option>120 minutos</option></select></p></div><p><label>Observaciones</label><textarea id="obs" placeholder="Ej: grupo con dificultades, actividad para copiar..."></textarea></p><button class="btn primary" onclick="gen()">Generar</button> <button class="btn" onclick="ej()">Ejemplo</button></div><div class="box out" id="out">Completá los datos y generá.</div></div><script>function $(x){return document.getElementById(x)}function n(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}const banco=[{k:['irracional','raiz','recta real','pi'],c:['número irracional','decimal infinito no periódico','raíz no exacta','aproximación','recta numérica'],e:['√2 no puede escribirse como fracción exacta','π se aproxima a 3,14 pero no termina allí','√5 está entre 2 y 3 porque 2²=4 y 3²=9'],a:'Ubicar √2, √3 y π en una recta numérica, justificar entre qué enteros se encuentran y explicar por qué no son racionales.',p:['¿Qué diferencia hay entre 1,333... y √2?','¿Por qué una aproximación no es el valor exacto?','¿Cómo ubicarías √5 en la recta?']},{k:['fraccion','fracciones','equivalente'],c:['fracción','equivalencia','numerador','denominador','representación gráfica'],e:['1/2, 2/4 y 4/8 representan la misma cantidad','una misma parte puede representarse con distintas fracciones'],a:'Representar fracciones con dibujos y recta numérica, construir equivalencias y justificar el procedimiento.',p:['¿Cómo sabés que dos fracciones son equivalentes?','¿Qué representa el denominador?']},{k:['ecuacion','ecuaciones'],c:['igualdad','incógnita','solución','miembros','verificación'],e:['2x+3=11 se resuelve aislando x','la solución se comprueba reemplazando la incógnita'],a:'Resolver ecuaciones simples, verificar resultados y crear una ecuación desde una situación cotidiana.',p:['¿Qué significa que un valor sea solución?','¿Cómo verificás tu respuesta?']},{k:['cuento','narrativo','narrador'],c:['narrador','personajes','conflicto','tiempo','espacio'],e:['un narrador protagonista cuenta desde su experiencia','el conflicto organiza el avance del relato'],a:'Leer un cuento breve, identificar narrador, conflicto y personajes, y reescribir una escena desde otro punto de vista.',p:['¿Quién cuenta la historia?','¿Cuál es el conflicto principal?']},{k:['algoritmo','programacion'],c:['algoritmo','secuencia','entrada','proceso','salida','condición'],e:['una receta puede leerse como algoritmo','un cajero sigue pasos ordenados'],a:'Diseñar un algoritmo cotidiano con entrada, proceso, salida y una condición en pseudocódigo.',p:['¿Qué datos entran?','¿Cuándo termina el algoritmo?']}];function cont(t){let q=n(t);let b=banco.find(x=>x.k.some(k=>q.includes(n(k))));if(b)return b;let w=t.split(/\s+/).filter(x=>x.length>3).slice(0,5);return{c:w.length?w:['conceptos clave','ejemplos','procedimiento','aplicación'],e:[`un ejemplo concreto de ${t}`,`una situación cotidiana vinculada con ${t}`],a:`Analizar ${t}, identificar conceptos clave, resolver una situación y escribir una conclusión propia.`,p:[`¿Qué significa ${t} con tus palabras?`,`¿Dónde se aplica ${t}?`]}}function pick(a){return a[Math.floor(Math.random()*a.length)]}function gen(){let mat=$('mat').value||'Materia',anio=$('anio').value,tema=$('tema').value||'tema',dur=$('dur').value,obs=$('obs').value||'Sin observaciones.';let c=cont(tema);let txt=`PLANIFICACIÓN DE CLASE\n\nMateria: ${mat}\nAño: ${anio}\nTema: ${tema}\nDuración: ${dur}\n\nCONTENIDO ESPECÍFICO\nConceptos clave: ${c.c.join(', ')}.\n\nEjemplos para trabajar:\n- ${c.e.join('\n- ')}\n\nPROPÓSITO\nQue las y los estudiantes comprendan ${tema}, puedan reconocer sus conceptos centrales, analizar ejemplos y producir una explicación propia.\n\nOBJETIVOS\n1. Reconocer: ${c.c.slice(0,4).join(', ')}.\n2. Analizar ejemplos relacionados con ${tema}.\n3. Resolver una actividad específica y justificar.\n4. Comunicar una conclusión.\n\nINICIO\nEl docente presenta la pregunta: “${pick(c.p)}”. Se anotan ideas previas y se muestra este ejemplo: ${pick(c.e)}.\n\nDESARROLLO\nActividad central: ${c.a}\n\nConsigna:\nA) Marcá los conceptos que aparecen.\nB) Resolvé o analizá la situación.\nC) Explicá el procedimiento.\nD) Escribí una conclusión sobre ${tema}.\n\nCIERRE\nPuesta en común. Cada grupo comparte una conclusión y una duda. El docente arma una síntesis usando: ${c.c.join(', ')}.\n\nEVALUACIÓN\nSe observa si reconoce conceptos, aplica ejemplos, justifica y comunica con claridad.\n\nACTIVIDAD IMPRIMIBLE\n1. Definí: ${c.c[0]||tema}.\n2. Analizá: ${pick(c.e)}.\n3. Resolvé: ${c.a}\n4. Escribí qué aprendiste sobre ${tema}.\n\nOBSERVACIONES\n${obs}`;$('out').innerHTML='<button class="btn" onclick="copiar()">Copiar</button> <button class="btn" onclick="window.print()">Imprimir</button>\n\n<span id="txt">'+txt.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')+'</span>'}function copiar(){navigator.clipboard.writeText($('txt').innerText).then(()=>alert('Copiado'))}function ej(){$('mat').value='Matemática';$('tema').value='números irracionales y recta real';$('obs').value='Incluir ejemplo resuelto y cierre con ticket de salida.'}</script></body></html>
