<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PID por DNI</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f7fb;color:#10243d;margin:0}
.wrap{max-width:1100px;margin:0 auto;padding:24px}
.card{background:#fff;border:1px solid #dbe4f0;border-radius:16px;padding:20px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr 160px auto;gap:12px;align-items:end}
label{display:block;font-size:13px;margin-bottom:6px;color:#5d7088;font-weight:700}
input,select{width:100%;padding:12px;border:1px solid #dbe4f0;border-radius:12px}
button,a.btn{padding:12px 16px;border:0;border-radius:12px;background:#0f3460;color:#fff;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.msg{margin-top:10px;font-weight:700}
.ok{color:#0b7a44}.err{color:#b42318}.info{color:#0f3460}
.meta{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:14px}
.box{background:#f8fafc;border:1px solid rgba(15,52,96,.10);border-radius:14px;padding:14px}
.k{display:block;font-size:12px;color:#64748b;font-weight:700;margin-bottom:6px}.v{display:block;font-size:15px;color:#10243d;font-weight:800;line-height:1.45}
.table{overflow:auto;border:1px solid #dbe4f0;border-radius:12px;margin-top:10px}
table{width:100%;border-collapse:collapse;min-width:760px}
th,td{padding:10px;border-bottom:1px solid #edf2f7;text-align:left;vertical-align:top}th{background:#f8fafc}
.section-row td{background:#eef4ff;color:#0f3460;font-size:13px;font-weight:800;border-top:1px solid #dbe4f0}
.title-cell{min-width:300px;white-space:normal}
.hint{font-size:12px;color:#64748b;margin-top:8px}
.subttl{margin:18px 0 6px;font-size:16px}
.counts{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 4px}.pill{display:inline-block;background:#eef4ff;color:#0f3460;border:1px solid #d6e4ff;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700}
pre.raw{margin-top:12px;background:#0b1220;color:#dbeafe;padding:14px;border-radius:12px;overflow:auto;font-size:12px;line-height:1.45}
@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.meta{grid-template-columns:1fr 1fr}}@media(max-width:640px){.grid,.meta{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<div class="card"><h1>Consulta PID por DNI</h1><p>Pantalla PID completa: muestra <strong>section_rows</strong>, <strong>items</strong> y el bloque de datos devuelto por el worker.</p></div>
<div class="card">
<div class="grid">
<div><label for="dni">DNI</label><input id="dni" type="text" inputmode="numeric" placeholder="34535989"></div>
<div><label for="listado">Listado</label><select id="listado"></select></div>
<div><label for="anio">Año</label><input id="anio" type="number" min="2015" max="2100"></div>
<div><button id="buscar" type="button">Buscar</button></div>
</div>
<div id="msg" class="msg"></div>
</div>
<div id="out" class="card">Todavía no se consultó ningún DNI.</div>
</div>
<script>
const API_URL='https://jolly-haze-f505.apdocentepba.workers.dev';
const LISTADOS=[['oficial','Listado Oficial'],['108a','Listado 108 a'],['fines','Listado FINES 1 (UNO)'],['108bfines','Listado FINES 2 (DOS)'],['108b','Listado 108 b'],['s108a','Listado 108 a Terciario'],['s108b','Listado 108 b Terciario'],['108ainfine','Listado 108 a In Fine'],['108binfine','Listado 108 b In Fine'],['108aEncierro','Listado Contextos de Encierro'],['108bEncierro','Listado 108 b Contextos de Encierro'],['formacionProfesionalPrincipalPreceptores','Listado FP PRINCIPAL PRECEPTORES'],['formacionProfesionalComplementoPreceptores','Listado Formacion FP Complementario Preceptores'],['formacionProfesionalPrincipalPanol','Listado FP Principal Pañol'],['formacionProfesionalComplementarioPanol','Listado FP Complementario Pañol'],['formacionProfesionalPrincipalFp','Listado FP Principal Formacion Profesional'],['formacionProfesionalComplementarioFp','Listado Complementario Formacion Profesional']];
const $=id=>document.getElementById(id);
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function clean(v){return String(v||'').replace(/\u00a0/g,' ').replace(/\s+/g,' ').trim();}
function setMsg(t,c){$('msg').textContent=t||'';$('msg').className='msg '+(c||'info');}
$('listado').innerHTML=LISTADOS.map(x=>'<option value="'+x[0]+'">'+x[1]+'</option>').join('');
$('listado').value='oficial';$('anio').value=String(new Date().getFullYear());
function normalizeSectionRows(rows){
  return (Array.isArray(rows)?rows:[]).map(function(row){
    return {bloque:clean(row&&row.bloque||''),area:clean(row&&row.area||''),titulo:clean(row&&row.titulo||''),porcentaje:clean(row&&row.porcentaje||''),puntaje_total:clean(row&&row.puntaje_total||'')};
  }).filter(function(row){return row.area||row.titulo||row.porcentaje||row.puntaje_total;});
}
function renderSectionRows(rows){
  const groups=[]; let current=null;
  rows.forEach(function(row){
    const bloque=row.bloque||'';
    if(!current||current.bloque!==bloque){current={bloque:bloque,rows:[]};groups.push(current);} current.rows.push(row);
  });
  return groups.map(function(group){
    const title=group.bloque||'Otros puntajes';
    const body=group.rows.map(function(row){
      return '<tr><td>'+esc(row.area||'-')+'</td><td class="title-cell">'+esc(row.titulo||'-')+'</td><td>'+esc(row.porcentaje||'-')+'</td><td>'+esc(row.puntaje_total||'-')+'</td></tr>';
    }).join('');
    return '<tr class="section-row"><td colspan="4">'+esc(title)+'</td></tr>'+body;
  }).join('');
}
function renderLegacyRows(rows){
  return rows.length?rows.map(function(it){return '<tr><td>'+esc(it.codigo||'-')+'</td><td>'+esc(it.rama||'-')+'</td><td>'+esc(it.puntaje||'-')+'</td><td>'+esc(it.fecha||'-')+'</td></tr>';}).join(''):'<tr><td colspan="4">No se encontraron filas.</td></tr>';
}
function renderResult(r,dni,listado,anio,data){
  const sectionRows=normalizeSectionRows(r.section_rows);
  const legacyRows=Array.isArray(r.items)?r.items:[];
  $('out').innerHTML=''
    +'<div class="meta">'
    +'<div class="box"><span class="k">Apellido y nombre</span><strong class="v">'+esc(r.apellido_nombre||'-')+'</strong></div>'
    +'<div class="box"><span class="k">Distrito de residencia</span><strong class="v">'+esc(r.distrito_residencia||'-')+'</strong></div>'
    +'<div class="box"><span class="k">Distritos solicitados</span><strong class="v">'+esc(r.distritos_solicitados||'-')+'</strong></div>'
    +'<div class="box"><span class="k">Oblea</span><strong class="v">'+esc(r.oblea||'-')+'</strong></div>'
    +'</div>'
    +'<p><strong>Consulta:</strong> DNI '+esc(dni)+' · listado '+esc(listado)+' · año '+esc(anio)+'</p>'
    +'<div class="counts"><span class="pill">section_rows: '+sectionRows.length+'</span><span class="pill">items: '+legacyRows.length+'</span><span class="pill">version: '+esc(data.version||'-')+'</span></div>'
    +'<h3 class="subttl">Estructura real del PID (section_rows)</h3>'
    +'<div class="table"><table><thead><tr><th>Área</th><th>Título</th><th>%</th><th>Puntaje total</th></tr></thead><tbody>'+(sectionRows.length?renderSectionRows(sectionRows):'<tr><td colspan="4">No vinieron section_rows.</td></tr>')+'</tbody></table></div>'
    +'<div class="hint">Esta es la tabla completa por bloques, áreas y títulos.</div>'
    +'<h3 class="subttl">Vista reducida heredada (items)</h3>'
    +'<div class="table"><table><thead><tr><th>Código</th><th>Rama</th><th>Puntaje</th><th>Fecha</th></tr></thead><tbody>'+(legacyRows.length?renderLegacyRows(legacyRows):'<tr><td colspan="4">No vinieron items.</td></tr>')+'</tbody></table></div>'
    +'<div class="hint">Esta sección deja visibles los items viejos para control y comparación.</div>'
    +'<h3 class="subttl">Respuesta cruda del worker</h3>'
    +'<pre class="raw">'+esc(JSON.stringify(data,null,2))+'</pre>';
}
async function run(){
const dni=$('dni').value.replace(/\D+/g,'');
const listado=$('listado').value; const anio=$('anio').value.trim();
const listadoLabel=$('listado').selectedOptions&&$('listado').selectedOptions[0]?$('listado').selectedOptions[0].textContent:listado;
if(!/^\d{7,8}$/.test(dni)) return setMsg('Ingresá un DNI válido.','err');
if(!/^\d{4}$/.test(anio)) return setMsg('Ingresá un año válido.','err');
$('buscar').disabled=true; $('buscar').textContent='Buscando...'; setMsg('Consultando PID...','info'); $('out').textContent='Consultando...';
try{
const res=await fetch(API_URL+'/api/pid-consultar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dni,listado,anio:Number(anio)})});
const data=await res.json().catch(()=>({}));
if(!res.ok||!data.ok) throw new Error(data.error||'No se pudo consultar PID.');
renderResult(data.result||{},dni,listadoLabel,anio,data);
setMsg('Consulta PID realizada correctamente.','ok');
}catch(err){$('out').textContent=err.message||'No se pudo consultar PID.';setMsg(err.message||'No se pudo consultar PID.','err');}
finally{$('buscar').disabled=false;$('buscar').textContent='Buscar';}
}
$('buscar').addEventListener('click',run); $('dni').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();run();}});
</script>
</body>
</html>
